[pytest]
# Only collect the dedicated tests/ dir — the repo-root test_*.py / simulate_*.py
# are manual integration scripts (hit the live API), not unit tests.
testpaths = tests
asyncio_mode = auto
# importlib mode avoids sys.path/basename collisions (robust when the repo path
# contains a space, as this one does) — fixes "import file mismatch" on full runs.
# "-m not behavioral" excludes the live-LLM behavioral tests from the default run:
# they hit the paid API, are non-deterministic, and are meant for manual/pre-deploy
# use. Run them explicitly with:  pytest -m behavioral
addopts = -q --import-mode=importlib -m "not behavioral"
markers =
    behavioral: live-LLM behavioral test (slow, costs API, non-deterministic; run manually)
filterwarnings =
    ignore::DeprecationWarning
