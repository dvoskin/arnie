services:
  - type: web
    name: arnie-landing
    runtime: static
    staticPublishPath: ./landing
    buildCommand: ""
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: arnie-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    disk:
      name: arnie-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////data/arnie.db
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DEFAULT_MODEL
        value: claude-sonnet-4-6
      - key: WHOOP_CLIENT_ID
        sync: false
      - key: WHOOP_CLIENT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: BLUEBUBBLES_URL
        sync: false
      - key: BLUEBUBBLES_PASSWORD
        sync: false
      - key: BLUEBUBBLES_WEBHOOK_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: USDA_API_KEY
        sync: false
