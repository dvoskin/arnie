# ─────────────────────────────────────────────────────────────────────────────
# REFERENCE / INTENDED INFRA — NOT auto-applied.
# arnie-bot is configured MANUALLY in the Render dashboard (not Blueprint-managed),
# so Render does not read this file. It documents the intended setup:
#   - DATABASE_URL points at the Render-managed Postgres `arnie-db` (cutover done
#     manually; old SQLite file kept on the disk as a fallback).
#   - `alembic upgrade heads` (plural) must run on schema changes — set as the
#     dashboard Pre-Deploy Command (paid instances) or run once in the service Shell.
#     Using `heads` (not `head`) tolerates multiple unmerged branches and never
#     fails with "Multiple head revisions" if migrations diverge temporarily.
#   - The /data disk stays for per-user memory files (ARNIE_USERS_DIR=/data/users).
# If this service is ever switched to Blueprint management, this spec becomes live —
# verify the DB `plan` id against the dashboard first.
# ─────────────────────────────────────────────────────────────────────────────
services:
  - type: web
    name: arnie-landing
    runtime: static
    staticPublishPath: ./landing
    buildCommand: ""
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: arnie-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    # preDeployCommand runs AFTER build and BEFORE the new instance serves traffic —
    # the correct place for migrations. `alembic upgrade heads` (plural) brings ALL
    # migration heads to their latest revision — safe with one head, immune to the
    # "Multiple head revisions" error if branches ever diverge again. A no-op once
    # up to date; does not run on every restart and won't race instances.
    preDeployCommand: alembic upgrade heads
    startCommand: python main.py
    # Disk stays: per-user memory/profile files live at /data/users (ARNIE_USERS_DIR),
    # which is NOT in Postgres. The DB itself is now Render-managed Postgres below.
    disk:
      name: arnie-data
      mountPath: /data
      sizeGB: 1
    envVars:
      # Postgres (Render-managed). fromDatabase injects the managed DB's connection
      # string; the app + Alembic coerce its libpq postgres:// form to psycopg3.
      - key: DATABASE_URL
        fromDatabase:
          name: arnie-db
          property: connectionString
      - key: ARNIE_USERS_DIR
        value: /data/users
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # Required for ALL voice features: Whisper transcription of inbound voice
      # notes AND tts-1 for spoken replies. Secret — set the value in the Render
      # dashboard. Without it, voice notes fail to transcribe and no audio is sent.
      - key: OPENAI_API_KEY
        sync: false
      - key: DEFAULT_MODEL
        value: claude-sonnet-4-6
      - key: WHOOP_CLIENT_ID
        sync: false
      - key: WHOOP_CLIENT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: BLUEBUBBLES_URL
        sync: false
      - key: BLUEBUBBLES_PASSWORD
        sync: false
      - key: BLUEBUBBLES_WEBHOOK_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: USDA_API_KEY
        sync: false
      - key: LINKING_ENABLED
        value: "true"
      # Master switch for the Brain tab (live mindmap of learned facts). When unset,
      # the dashboard hides the Brain nav/panel and /brain/{token} + /api/brain/insights
      # return 404 by design. Set to "true"/"1" in the Render dashboard to expose it
      # (this file is reference-only, so the dashboard value is what actually applies).
      - key: BRAIN_TAB_ENABLED
        value: "true"
      - key: ARNIE_IMESSAGE_ADDRESS
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        value: "Arnie_1026_Bot"
      # Global master switch for proactive check-ins. Per-user check-ins are enabled
      # natively at onboarding completion, but NOTHING sends until this is "true".
      # Set it to "true" in the Render dashboard to go live (this file is reference-only).
      - key: PROACTIVE_MESSAGING_ENABLED
        value: "true"
      # Reply to an inbound voice note with a spoken (TTS) voice note, in addition
      # to the text reply. Telegram only; requires OPENAI_API_KEY. Flip to "true"
      # in the Render dashboard to go live (this file is reference-only).
      - key: VOICE_REPLIES_ENABLED
        value: "false"
      # Branded base for user-facing dashboard links (separate from RENDER_EXTERNAL_URL,
      # which webhooks/OAuth keep using). SET THIS ONLY AFTER app.tryarnie.com is added
      # as a custom domain on this service and DNS resolves — until then leave it unset
      # and links safely fall back to the service's own host.
      - key: DASHBOARD_BASE_URL
        value: "https://app.tryarnie.com"

databases:
  # Render-managed Postgres. Replaces the SQLite-on-disk DB (AUDIT #5). Fresh start:
  # no data is migrated from the old SQLite file (it stays on the disk as a fallback).
  # The arnie-bot service reads its connection string via DATABASE_URL fromDatabase.
  - name: arnie-db
    databaseName: arnie
    plan: basic-256mb
