name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Match production (Render runs 3.14) so CI catches version-specific issues.
          python-version: "3.14"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Byte-compile (catch syntax/indentation errors before runtime)
        run: python -m compileall -q api bot core db handlers memory scheduler wearables skills main.py

      - name: Run tests
        env:
          LINKING_ENABLED: "true"
          PROACTIVE_MESSAGING_ENABLED: "false"
        run: python -m pytest
